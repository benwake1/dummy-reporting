name: Cypress Demo - Templated Dashboard

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-publish-templated:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout main branch for dependencies
      - name: Checkout main for dependencies
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node and npm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install deps
        run: npm ci

      # 4️⃣ Run Cypress tests
      - name: Run Cypress
        run: npm run test:ci

      # 5️⃣ Merge Mochawesome JSON
      - name: Merge Mochawesome
        run: npx mochawesome-merge mochawesome-report/*.json > mochawesome-report/merged.json

      # 6️⃣ Generate HTML report
      - name: Generate HTML report
        run: npx marge mochawesome-report/merged.json --reportDir mochawesome-report/html --reportFilename index

      # 📦 Upload Cypress artifacts
      - name: Upload Cypress Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ github.run_id }}
          retention-days: 14
          path: |
            mochawesome-report/html
            mochawesome-report/merged.json
            cypress/screenshots

      # 7️⃣ Checkout gh-pages branch for publishing
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      # 8️⃣ Checkout main branch again for template access
      - name: Checkout main branch for template
        uses: actions/checkout@v4
        with:
          path: main-checkout
          fetch-depth: 0

      # 9️⃣ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare Templated Pages
        run: |
          set -e

          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          BASE_URL="https://${OWNER}.github.io/${REPO}/"

          SHA="${GITHUB_SHA}"
          RUN_ID="${GITHUB_RUN_ID}"

          REPORT_PATH="reports/$SHA/run-$RUN_ID"
          PAGE_URL="$REPORT_PATH/"

          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          HUMAN_TS="$(date -u +"%b %d, %Y %H:%M UTC")"

          mkdir -p "gh-pages/$REPORT_PATH"
          cp -r mochawesome-report/html/* "gh-pages/$REPORT_PATH"

          # 🔎 Fetch artifact metadata from GitHub API
          ARTIFACT_JSON=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts")

          ARTIFACT=$(echo "$ARTIFACT_JSON" | jq '.artifacts[0]')
          ARTIFACT_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}#artifacts"
          ARTIFACT_SIZE_MB=$(echo "$ARTIFACT" | jq '(.size_in_bytes / 1024 / 1024 | floor)')
          ARTIFACT_EXPIRES=$(echo "$ARTIFACT" | jq -r '.expires_at')

          # Failed tests
          FAILURES=$(jq '[.results[].suites[].tests[]? | select(.fail) | .title]' mochawesome-report/merged.json)

          STATUS=$(jq '.stats | { passes, failures, pending, duration }' mochawesome-report/merged.json)

          MSG=$(git log -1 --pretty=%s)
          AUTHOR=$(git log -1 --pretty=%an)
          BRANCH="${GITHUB_REF#refs/heads/}"

          HISTORY_FILE="gh-pages/templated_history.json"
          [ -f "$HISTORY_FILE" ] || echo "[]" > "$HISTORY_FILE"

          UPDATED=$(jq \
            --arg sha "$SHA" \
            --arg run_id "$RUN_ID" \
            --arg url "$PAGE_URL" \
            --arg ts "$TS" \
            --arg hts "$HUMAN_TS" \
            --arg branch "$BRANCH" \
            --arg msg "$MSG" \
            --arg author "$AUTHOR" \
            --arg artifact_url "$ARTIFACT_URL" \
            --arg expires "$ARTIFACT_EXPIRES" \
            --arg size "$ARTIFACT_SIZE_MB" \
            --argjson status "$STATUS" \
            --argjson failures "$FAILURES" \
            '. += [{
              sha: $sha,
              run_id: $run_id,
              url: $url,
              timestamp: $ts,
              human_timestamp: $hts,
              branch: $branch,
              message: $msg,
              author: $author,
              status: $status,
              failures: $failures,
              artifact: {
                url: $artifact_url,
                size_mb: $size,
                expires_at: $expires
              }
            }] | sort_by(.timestamp) | reverse | .[:10]' "$HISTORY_FILE")

          echo "$UPDATED" > "$HISTORY_FILE"

          DASHBOARD_ITEMS=$(jq -r '
            .[] |
            . as $r |
            $r.status as $s |
            (if $s.failures > 0 then "fail" else "pass" end) as $cls |
            "<li>" +
              "<a href=\"'"$BASE_URL"'"+$r.url+"\">" + $r.sha + " (run " + $r.run_id + ")</a> " +
              "<a class=\"artifact-btn\" href=\"" + $r.artifact.url + "\" target=\"_blank\">📦 Artifacts</a> " +
              "<span class=\"" + $cls + "\">" +
                ($s.passes|tostring) + " ✅ / " + ($s.failures|tostring) + " ❌</span>" +
              "<div class=\"meta\">" +
                $r.message + " — " + $r.author +
                " · " + $r.branch +
                " · " + (if $s.duration then ($s.duration / 1000 | floor | tostring) + "s" else "—" end) +
                " · " + $r.human_timestamp +
              "</div>" +
              "<div class=\"artifact-meta\">" +
                "📦 " + ($r.artifact.size_mb|tostring) + " MB" +
                " · ⏳ expires " + ($r.artifact.expires_at | sub(\"T.*\"; \"\")) +
              "</div>" +
              (if ($r.failures|length) > 0 then
                "<details><summary>❌ Failed tests</summary><ul>" +
                ($r.failures | map("<li>" + . + "</li>") | join("")) +
                "</ul></details>"
              else "" end) +
              "<details><summary>🖼️ Screenshots</summary>" +
                "<a href=\"" + $r.artifact.url + "\" target=\"_blank\">View screenshots in artifacts</a>" +
              "</details>" +
            "</li>"
          ' "$HISTORY_FILE")

          awk -v items="$DASHBOARD_ITEMS" '
            {
              print
              if ($0 ~ /<ul>/) {
                print items
              }
            }
          ' main-checkout/.cypress-dashbord/template.html > gh-pages/templated_index.html
      
      # 1️⃣1️⃣ Deploy Pages (templated)
      - name: Deploy Pages (templated)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          keep_files: true
