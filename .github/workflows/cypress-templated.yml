name: Cypress Demo - With Templated Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout main branch into main-checkout folder
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: main-checkout
          fetch-depth: 0

      # Setup Node in main-checkout so package-lock.json is detected
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
        working-directory: main-checkout

      # Install dependencies
      - name: Install dependencies
        run: npm ci
        working-directory: main-checkout

      # Run Cypress tests
      - name: Run Cypress
        run: npm run test:ci
        working-directory: main-checkout

      # Merge Mochawesome reports
      - name: Merge Mochawesome
        run: npx mochawesome-merge mochawesome-report/*.json > mochawesome-report/merged.json
        working-directory: main-checkout

      # Generate HTML report
      - name: Generate HTML report
        run: npx marge mochawesome-report/merged.json --reportDir mochawesome-report/html --reportFilename index
        working-directory: main-checkout

      # Checkout gh-pages branch
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      # Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Prepare Pages with template
      - name: Prepare Pages
        run: |
          set -e

          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          RUN_ID="${{ github.run_id }}"

          REPORT_PATH="reports/$SHA/run-$RUN_ID"
          PAGE_URL="$REPORT_PATH/"

          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          HUMAN_TS="$(date -u +"%b %d, %Y %H:%M UTC")"

          mkdir -p "gh-pages/$REPORT_PATH"
          cp -r main-checkout/mochawesome-report/html/* "gh-pages/$REPORT_PATH"

          # Screenshots
          SCREENSHOTS="[]"
          if [ -d main-checkout/cypress/screenshots ]; then
            mkdir -p "gh-pages/$REPORT_PATH/screenshots"
            cp -r main-checkout/cypress/screenshots/* "gh-pages/$REPORT_PATH/screenshots"
            SCREENSHOTS=$(find "gh-pages/$REPORT_PATH/screenshots" -type f | sed "s|gh-pages/||" | jq -R . | jq -s .)
          fi

          # Failed tests
          FAILURES=$(jq '[.results[].suites[].tests[]? | select(.fail) | .title]' main-checkout/mochawesome-report/merged.json)

          STATUS=$(jq '.stats | { passes, failures, pending, duration }' main-checkout/mochawesome-report/merged.json)

          MSG=$(git -C main-checkout log -1 --pretty=%s)
          AUTHOR=$(git -C main-checkout log -1 --pretty=%an)
          BRANCH="${GITHUB_REF#refs/heads/}"

          HISTORY_FILE="gh-pages/history.json"
          [ -f "$HISTORY_FILE" ] || echo "[]" > "$HISTORY_FILE"

          UPDATED=$(jq \
            --arg sha "$SHA" \
            --arg run_id "$RUN_ID" \
            --arg url "$PAGE_URL" \
            --arg ts "$TS" \
            --arg hts "$HUMAN_TS" \
            --arg branch "$BRANCH" \
            --arg msg "$MSG" \
            --arg author "$AUTHOR" \
            --argjson status "$STATUS" \
            --argjson failures "$FAILURES" \
            --argjson screenshots "$SCREENSHOTS" \
            '. += [{
              sha: $sha,
              run_id: $run_id,
              url: $url,
              timestamp: $ts,
              human_timestamp: $hts,
              branch: $branch,
              message: $msg,
              author: $author,
              status: $status,
              failures: $failures,
              screenshots: $screenshots
            }] | sort_by(.timestamp) | reverse | .[:10]' "$HISTORY_FILE")

          echo "$UPDATED" > "$HISTORY_FILE"

          # Build dashboard using template
          TEMPLATE="main-checkout/.cypress-dashbord/template.html"
          [ -f "$TEMPLATE" ] || echo "ERROR: Template not found!" && exit 1

          cp "$TEMPLATE" gh-pages/templated_index.html

          # Replace placeholders
          sed -i "s|{{HISTORY_JSON}}|$UPDATED|g" gh-pages/templated_index.html

      # Deploy Pages
      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          keep_files: true
