name: Cypress Demo CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npm run test:ci

      - run: |
          npx mochawesome-merge mochawesome-report/*.json > mochawesome-report/merged.json

      - run: |
          npx marge mochawesome-report/merged.json                 --reportDir mochawesome-report/html                 --reportFilename index

      - uses: actions/upload-artifact@v4
        with:
          name: mochawesome-${{ github.sha }}
          path: |
            mochawesome-report
            cypress/screenshots
            cypress/videos

      - name: Prepare GitHub Pages content
        run: |
          REPORT_PATH=reports/${{ github.sha }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p gh-pages/$REPORT_PATH
          cp -r mochawesome-report/html/* gh-pages/$REPORT_PATH

          if [ -f gh-pages/history.json ]; then
            HISTORY=$(cat gh-pages/history.json)
          else
            HISTORY="[]"
          fi

          UPDATED_HISTORY=$(echo "$HISTORY" | jq                 --arg sha "${{ github.sha }}"                 --arg url "/$REPORT_PATH/"                 --arg ts "$TIMESTAMP"                 '. += [{"sha":$sha,"url":$url,"timestamp":$ts}]
             | sort_by(.timestamp)
             | reverse
             | .[:10]')

          echo "$UPDATED_HISTORY" > gh-pages/history.json

          {
            cat <<'HTML_HEAD'
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Cypress Test History</title>
<style>
body {
  font-family: system-ui;
  background: #0f172a;
  color: #e5e7eb;
  padding: 2rem;
}
li {
  background: #020617;
  margin-bottom: 0.75rem;
  padding: 1rem;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}
a {
  color: #38bdf8;
  font-weight: 600;
  text-decoration: none;
}
span {
  opacity: 0.7;
}
</style>
</head>
<body>
<h1>🧪 Cypress Test Report History</h1>
<ul>
HTML_HEAD

            echo "$UPDATED_HISTORY" | jq -r                   '.[] | "<li><a href=\"\(.url)\">\(.sha)</a><span>\(.timestamp)</span></li>"'

            cat <<'HTML_FOOT'
</ul>
</body>
</html>
HTML_FOOT
          } > gh-pages/history.html

          echo "<meta http-equiv='refresh' content='0; url=history.html'>" > gh-pages/index.html

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages

      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/reports/${context.sha}/`
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🧪 Cypress Test Report\n\n🔗 ${url}`
            })
