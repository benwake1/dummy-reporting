name: Cypress Demo CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:ci

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge mochawesome-report/*.json > mochawesome-report/merged.json

      - name: Generate HTML report
        run: |
          npx marge mochawesome-report/merged.json --reportDir mochawesome-report/html --reportFilename index

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-${{ github.sha }}
          path: |
            mochawesome-report
            cypress/screenshots
            cypress/videos

      # Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Prepare GitHub Pages content
      - name: Prepare GitHub Pages content
        run: |
          set -e

          REPORT_PATH="reports/${{ github.sha }}/run-${{ github.run_id }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          HUMAN_TS="$(date -u +"%b %d, %Y %H:%M UTC")"

          mkdir -p "gh-pages/$REPORT_PATH"
          cp -r mochawesome-report/html/* "gh-pages/$REPORT_PATH"

          # Extract pass/fail/pending counts
          STATUS="$(jq '.stats | {passes, failures, pending, duration}' mochawesome-report/merged.json)"

          # Load existing history
          if [ -f gh-pages/history.json ]; then
            HISTORY="$(cat gh-pages/history.json)"
          else
            HISTORY="[]"
          fi

          # Append new run, normalize old entries, sort, keep last 10
          UPDATED_HISTORY="$(echo "$HISTORY" | jq \
            --arg sha "${{ github.sha }}" \
            --arg url "$REPORT_PATH/" \
            --arg ts "$TIMESTAMP" \
            --arg human_ts "$HUMAN_TS" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --argjson status "$STATUS" \
            '. += [{
                  "sha": $sha,
                  "run_id": $run_id,
                  "run_attempt": $run_attempt,
                  "url": $url,
                  "timestamp": $ts,
                  "human_timestamp": $human_ts,
                  "status": $status
                }]
             | map(if has("id") then del(.id) else . end)
             | sort_by(.timestamp)
             | reverse
             | .[:10]')"

          echo "$UPDATED_HISTORY" > gh-pages/history.json

          # Generate HTML dashboard
          cat > gh-pages/history.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <title>Cypress Test History</title>
            <style>
              body { font-family: system-ui; background: #0f172a; color: #e5e7eb; padding: 2rem; }
              li { background: #020617; margin-bottom: 0.75rem; padding: 1rem; border-radius: 8px; }
              a { color: #38bdf8; font-weight: 600; text-decoration: none; }
              span { opacity: 0.8; margin-left: 0.5rem; }
              .pass { color: #22c55e; font-weight: bold; }
              .fail { color: #ef4444; font-weight: bold; }
              .pending { color: #fbbf24; font-weight: bold; }
              details { margin-top: 0.25rem; }
              summary { cursor: pointer; }
            </style>
          </head>
          <body>
            <h1>🧪 Cypress Test Report History</h1>
            <ul>
          EOF

          # Group by SHA and render
          echo "$UPDATED_HISTORY" | jq -r '
            group_by(.sha)[] |
            . as $group |
            $latest = $group[0] |
            $status = $latest.status |
            $status_class = if $status.failures > 0 then "fail" elif $status.pending > 0 then "pending" else "pass" end |
            "<li><a href=\"" + $latest.url + "\">" + $latest.sha + " (latest run)</a> <span class=\"" + $status_class + "\">" + ($status.passes|tostring) + " ✅ / " + ($status.failures|tostring) + " ❌</span>" +
            (if ($group|length) > 1 then "<details><summary>Reruns</summary><ul>" + ($group[1:] | map("<li><a href=\"" + .url + "\">Run " + .run_id + "</a> <span>Pass: " + (.status.passes|tostring) + " Fail: " + (.status.failures|tostring) + " Pending: " + (.status.pending|tostring) + " — " + .human_timestamp + "</span></li>") | join("") ) + "</ul></details>" else "" end) +
            "</li>"
          ' >> gh-pages/history.html

          cat >> gh-pages/history.html <<'EOF'
            </ul>
          </body>
          </html>
          EOF

          # redirect index.html to history.html
          echo '<meta http-equiv="refresh" content="0; url=history.html">' > gh-pages/index.html

      # Deploy to GitHub Pages
      - name: Deploy GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          force_orphan: false
          keep_files: true

      # Comment PR with report link
      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha || context.sha;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/reports/${sha}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🧪 Cypress Test Report\n\n🔗 ${url}`
            });
