name: Cypress Demo - With Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run Cypress
        run: npm run test:ci

      - name: Merge Mochawesome
        run: |
          npx mochawesome-merge mochawesome-report/*.json > mochawesome-report/merged.json

      - name: Generate HTML report
        run: |
          npx marge mochawesome-report/merged.json \
            --reportDir mochawesome-report/html \
            --reportFilename index

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare Pages
        run: |
          set -e

          REPORT_PATH="reports/${{ github.sha }}/run-${{ github.run_id }}"
          PAGE_URL="reports/${{ github.sha }}/run-${{ github.run_id }}/"
          TS="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          HUMAN_TS="$(date -u +"%b %d, %Y %H:%M UTC")"

          mkdir -p "gh-pages/$REPORT_PATH"
          cp -r mochawesome-report/html/* "gh-pages/$REPORT_PATH"

          # Copy screenshots and enumerate files
          SCREENSHOTS="[]"
          if [ -d cypress/screenshots ]; then
            mkdir -p "gh-pages/$REPORT_PATH/screenshots"
            cp -r cypress/screenshots/* "gh-pages/$REPORT_PATH/screenshots"
            SCREENSHOTS=$(find "gh-pages/$REPORT_PATH/screenshots" -type f | sed "s|^gh-pages/||" | jq -R . | jq -s .)
          fi

          # Failed tests
          FAILURES=$(jq '
            [.results[].suites[].tests[]?
              | select(.fail)
              | .title]
          ' mochawesome-report/merged.json)

          # Stats
          STATUS=$(jq '.stats | {
            passes,
            failures,
            pending,
            duration
          }' mochawesome-report/merged.json)

          MSG="$(git log -1 --pretty=%s)"
          AUTHOR="$(git log -1 --pretty=%an)"
          BRANCH="${GITHUB_REF#refs/heads/}"

          HISTORY_FILE="gh-pages/history.json"
          [ -f "$HISTORY_FILE" ] || echo "[]" > "$HISTORY_FILE"

          UPDATED=$(jq \
            --arg sha "${{ github.sha }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg url "$PAGE_URL" \
            --arg ts "$TS" \
            --arg hts "$HUMAN_TS" \
            --arg branch "$BRANCH" \
            --arg msg "$MSG" \
            --arg author "$AUTHOR" \
            --argjson status "$STATUS" \
            --argjson failures "$FAILURES" \
            --argjson screenshots "$SCREENSHOTS" \
            '. += [{
              sha: $sha,
              run_id: $run_id,
              url:
