name: Cypress Demo - With Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:ci

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge mochawesome-report/*.json \
            > mochawesome-report/merged.json

      - name: Generate HTML report
        run: |
          npx marge mochawesome-report/merged.json \
            --reportDir mochawesome-report/html \
            --reportFilename index

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-${{ github.sha }}
          path: |
            mochawesome-report
            cypress/screenshots
            cypress/videos

      # 🔑 Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Prepare GitHub Pages content
      - name: Prepare GitHub Pages content
        run: |
          set -e

          # Unique report folder per workflow run
          REPORT_PATH="reports/${{ github.sha }}/run-${{ github.run_id }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          HUMAN_TS="$(date -u +"%b %d, %Y %H:%M UTC")"

          mkdir -p "gh-pages/$REPORT_PATH"
          cp -r mochawesome-report/html/* "gh-pages/$REPORT_PATH"

          # Load existing history or initialize
          if [ -f gh-pages/history.json ]; then
            HISTORY="$(cat gh-pages/history.json)"
          else
            HISTORY="[]"
          fi

          # Append new run and normalize old entries
          UPDATED_HISTORY="$(echo "$HISTORY" | jq \
            --arg sha "${{ github.sha }}" \
            --arg url "reports/$REPORT_PATH/" \
            --arg ts "$TIMESTAMP" \
            --arg human_ts "$HUMAN_TS" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            '. += [{
                  "sha": $sha,
                  "run_id": $run_id,
                  "run_attempt": $run_attempt,
                  "url": $url,
                  "timestamp": $ts,
                  "human_timestamp": $human_ts
                }]
             | map(if has("id") then del(.id) else . end)
             | sort_by(.timestamp)
             | reverse
             | .[:10]')"

          echo "$UPDATED_HISTORY" > gh-pages/history.json

          # Generate history.html
          cat > gh-pages/history.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <title>Cypress Test History</title>
            <style>
              body { font-family: system-ui; background: #0f172a; color: #e5e7eb; padding: 2rem; }
              li { background: #020617; margin-bottom: 0.75rem; padding: 1rem; border-radius: 8px; display: flex; justify-content: space-between; }
              a { color: #38bdf8; font-weight: 600; text-decoration: none; }
              span { opacity: 0.7; }
            </style>
          </head>
          <body>
            <h1>🧪 Cypress Test Report History</h1>
            <ul>
          EOF

          # Render each entry
          echo "$UPDATED_HISTORY" | jq -r '
            .[] |
            "<li><a href=\"" + .url + "\">" + .sha +
            (if has("run_attempt") then " (run " + (.run_attempt|tostring) + ")" else "" end) +
            "</a><span>" + .human_timestamp + "</span></li>"
          ' >> gh-pages/history.html

          cat >> gh-pages/history.html <<'EOF'
            </ul>
          </body>
          </html>
          EOF

          # redirect index.html to history.html
          echo '<meta http-equiv="refresh" content="0; url=history.html">' > gh-pages/index.html

      # Deploy to GitHub Pages
      - name: Deploy GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          force_orphan: false
          keep_files: true

      # Comment PR with report link
      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request?.head.sha || context.sha;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/reports/${sha}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🧪 Cypress Test Report\n\n🔗 ${url}`
            });
