name: Cypress Demo CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cypress-pages
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run test:ci

      - name: Merge Mochawesome reports
        run: |
          npx mochawesome-merge mochawesome-report/*.json \
            > mochawesome-report/merged.json

      - name: Generate HTML report
        run: |
          npx marge mochawesome-report/merged.json \
            --reportDir mochawesome-report/html \
            --reportFilename index

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-${{ github.sha }}
          path: |
            mochawesome-report
            cypress/screenshots
            cypress/videos

      # 🔑 IMPORTANT: bring in existing Pages content
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare GitHub Pages content
        run: |
          set -e

          REPORT_PATH="reports/${{ github.sha }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          mkdir -p "gh-pages/$REPORT_PATH"
          cp -r mochawesome-report/html/* "gh-pages/$REPORT_PATH"

          if [ -f gh-pages/history.json ]; then
            HISTORY="$(cat gh-pages/history.json)"
          else
            HISTORY="[]"
          fi

          UPDATED_HISTORY="$(echo "$HISTORY" | jq \
            --arg sha "${{ github.sha }}" \
            --arg url "/$REPORT_PATH/" \
            --arg ts "$TIMESTAMP" \
            '. += [{"sha":$sha,"url":$url,"timestamp":$ts}]
             | sort_by(.timestamp)
             | reverse
             | .[:10]')"

          echo "$UPDATED_HISTORY" > gh-pages/history.json

          cat > gh-pages/history.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <title>Cypress Test History</title>
            <style>
              body {
                font-family: system-ui;
                background: #0f172a;
                color: #e5e7eb;
                padding: 2rem;
              }
              li {
                background: #020617;
                margin-bottom: 0.75rem;
                padding: 1rem;
                border-radius: 8px;
                display: flex;
                justify-content: space-between;
              }
              a {
                color: #38bdf8;
                font-weight: 600;
                text-decoration: none;
              }
              span {
                opacity: 0.7;
              }
            </style>
          </head>
          <body>
            <h1>🧪 Cypress Test Report History</h1>
            <ul>
          EOF

          echo "$UPDATED_HISTORY" | jq -r \
            '.[] | "<li><a href=\"\(.url)\">\(.sha)</a><span>\(.timestamp)</span></li>"' \
            >> gh-pages/history.html

          cat >> gh-pages/history.html <<'EOF'
            </ul>
          </body>
          </html>
          EOF

          echo '<meta http-equiv="refresh" content="0; url=history.html">' \
            > gh-pages/index.html

      - name: Deploy GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          force_orphan: false

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const sha =
              context.payload.pull_request?.head.sha || context.sha;

            const url =
              `https://${context.repo.owner}.github.io/${context.repo.repo}/reports/${sha}/`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🧪 Cypress Test Report\n\n🔗 ${url}`
            });
