<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Cypress CI Dashboard - Templated</title>
        <link rel="stylesheet" href="assets/output.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <h1>🧪 Cypress CI Dashboard</h1>

        <h2>📊 Test Trends</h2>
        <canvas id="trendChart" width="800" height="250"></canvas>

        <ul>
            <!-- DASHBOARD_ITEMS -->
        </ul>

        <script>
            // Fetch JSON history
            fetch('templated_history.json')
                .then((res) => res.json())
                .then((data) => {
                    data.sort(
                        (a, b) => new Date(a.timestamp) - new Date(b.timestamp),
                    );

                    const labels = data.map((r) => r.human_timestamp);
                    const passes = data.map((r) => r.status.passes);
                    const failures = data.map((r) => r.status.failures);
                    const durations = data.map((r) =>
                        r.status.duration
                            ? (r.status.duration / 1000).toFixed(1)
                            : 0,
                    );

                    const ctx = document
                        .getElementById('trendChart')
                        .getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [
                                {
                                    label: 'Passes',
                                    data: passes,
                                    backgroundColor: 'rgba(34,197,94,0.7)',
                                },
                                {
                                    label: 'Failures',
                                    data: failures,
                                    backgroundColor: 'rgba(239,68,68,0.7)',
                                },
                                {
                                    label: 'Duration (s)',
                                    data: durations,
                                    type: 'line',
                                    borderColor: 'gold',
                                    backgroundColor: 'rgba(250,204,21,0.3)',
                                    yAxisID: 'y1',
                                    tension: 0.2,
                                    fill: false,
                                    pointRadius: 4,
                                },
                            ],
                        },
                        options: {
                            responsive: true,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: { position: 'top' },
                                tooltip: { mode: 'index', intersect: false },
                            },
                            scales: {
                                y: {
                                    stacked: true,
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Tests Count',
                                    },
                                },
                                y1: {
                                    stacked: false,
                                    beginAtZero: true,
                                    position: 'right',
                                    title: {
                                        display: true,
                                        text: 'Duration (s)',
                                    },
                                    grid: { drawOnChartArea: false },
                                },
                                x: { stacked: true },
                            },
                        },
                    });
                });
        </script>
    </body>
</html>
